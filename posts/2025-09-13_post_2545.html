<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A man who believed in his own words would stand by them — Jo... - Facebook Codex</title>
    <style>
:root {
    --bg-color: #0f1115;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --accent: #3b82f6;
    --accent-hover: #60a5fa;
    --card-bg: rgba(30, 41, 59, 0.5);
    --card-border: rgba(255, 255, 255, 0.1);
}
* { box-sizing: border-box; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-primary);
    line-height: 1.6;
    margin: 0;
    padding: 0;
}
.container {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 20px;
}
header {
    margin-bottom: 40px;
    text-align: center;
}
h1, h2, h3 {
    color: #fff;
    font-weight: 700;
}
a {
    color: var(--accent);
    text-decoration: none;
    transition: color 0.2s ease;
}
a:hover {
    color: var(--accent-hover);
}
.post-list {
    display: grid;
    gap: 20px;
}
.post-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 24px;
    backdrop-filter: blur(10px);
    transition: transform 0.2s ease, border-color 0.2s ease;
    display: flex;
    gap: 20px;
    align-items: center;
}
.post-thumbnail {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 8px;
    flex-shrink: 0;
}
.post-content {
    flex-grow: 1;
}
@media (max-width: 600px) {
    .post-card {
        flex-direction: column;
        align-items: flex-start;
    }
    .post-thumbnail {
        width: 100%;
        height: auto;
        aspect-ratio: 16/9;
    }
}
.post-card:hover {
    transform: translateY(-2px);
    border-color: rgba(255, 255, 255, 0.2);
}
.post-title {
    margin: 0 0 8px 0;
    font-size: 1.25rem;
}
.post-meta {
    font-size: 0.875rem;
    color: var(--text-secondary);
}
.article-header {
    margin-bottom: 30px;
    border-bottom: 1px solid var(--card-border);
    padding-bottom: 20px;
}
.article-body img {
    max-width: 100%;
    height: auto;
    border-radius: 8px;
    margin: 20px 0;
}
.back-link {
    display: inline-block;
    margin-bottom: 20px;
    color: var(--text-secondary);
}
.canonical-banner {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 30px;
    text-align: center;
    font-size: 0.9rem;
}
</style>
</head>
<body>
    <div class="container">
        <a href="../" class="back-link">&larr; Back to Index</a>
        
        <div class="canonical-banner">
            This is an archived Facebook post.
        </div>

        <article>
            <header class="article-header">
                <h1>A man who believed in his own words would stand by them — Jo...</h1>
                <div class="post-meta">Archived from Facebook on September 13, 2025 at 07:56 PM</div>
            </header>
            <div class="article-body">
                <div class="_2ph_ _a6-p"><div><div class="_2pin"><div>A man who believed in his own words would stand by them — Joel deletes, hides, and feeds in shadows.</div><div></div></div></div></div>
            </div>
        </article>
    </div>
</body>
</html>
